<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jiashu Pu</title>
  <meta name="description" content="Jiashu Pu — NLP Research Scientist at Garena" />
  <style>
    :root {
      --bg: #f5f3ee;
      --panel: rgba(255, 255, 255, 0.72);
      --text: #111111;
      --muted: #666666;
      --line: rgba(17, 17, 17, 0.08);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI",
        Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(0,0,0,0.03), transparent 28%),
        radial-gradient(circle at bottom right, rgba(0,0,0,0.035), transparent 26%),
        var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .card {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 56px 44px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topline {
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      font-weight: 700;
    }

    .subtitle {
      margin-top: 24px;
      font-size: 1.15rem;
      line-height: 1.7;
      color: var(--muted);
      max-width: 34rem;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 34px 0 28px;
    }

    .meta {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 10px 18px;
      align-items: start;
      font-size: 0.98rem;
    }

    .meta-label {
      color: var(--muted);
    }

    .actions {
      margin-top: 36px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .button {
      appearance: none;
      border: 1px solid var(--text);
      background: var(--text);
      color: #ffffff;
      border-radius: 999px;
      padding: 13px 22px;
      font-size: 0.96rem;
      font-weight: 500;
      text-decoration: none;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }

    .button.secondary {
      background: transparent;
      color: var(--text);
      border-color: var(--line);
    }

    .button.secondary:hover {
      background: rgba(0,0,0,0.03);
      opacity: 1;
    }

    .foot {
      margin-top: 42px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .card {
        padding: 34px 24px;
        border-radius: 22px;
      }

      .meta {
        grid-template-columns: 1fr;
        gap: 4px 0;
      }

      .subtitle {
        font-size: 1.02rem;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="topline">Personal Website</div>

    <h1>Jiashu Pu</h1>

    <p class="subtitle">
      NLP Research Scientist at Garena, focused on natural language processing,
      large language models, and research-driven AI systems.
    </p>

    <div class="divider"></div>

    <section class="meta" aria-label="Profile information">
      <div class="meta-label">Position</div>
      <div>NLP Research Scientist</div>

      <div class="meta-label">Company</div>
      <div>Garena</div>

      <div class="meta-label">Scholar</div>
      <div>
        <a href="https://scholar.google.com/citations?user=DuFytioAAAAJ&hl=en" target="_blank" rel="noreferrer">
          Google Scholar
        </a>
      </div>
    </section>

    <div class="actions">
      <a
        class="button"
        href="https://scholar.google.com/citations?user=DuFytioAAAAJ&hl=en"
        target="_blank"
        rel="noreferrer"
      >
        View Google Scholar
      </a>
    </div>

    <div class="foot">
      A minimal academic profile.
    </div>
  </main>
</body>
</html>
